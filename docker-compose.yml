version: '3.8'

services:
  postgres:
    image: postgres:alpine
    container_name: quicktix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quicktix
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: quicktix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  load-balancer:
    image: nginx:alpine
    container_name: quicktix-load-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    depends_on:
      - postgres
      - redis