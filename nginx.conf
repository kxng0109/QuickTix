events {
    worker_connections 10000; # Allow Nginx to handle massive concurrency
}

http {
    upstream quicktix_cluster {
        # Point to the 3 Spring Boot servers running on your host machine
        # 'host.docker.internal' lets the Docker container talk to localhost
        server host.docker.internal:8081;
        server host.docker.internal:8082;
        server host.docker.internal:8083;
    }

    server {
        listen 80; # Nginx will listen on standard HTTP port 80

        location / {
            proxy_pass http://quicktix_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}