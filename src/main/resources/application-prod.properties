# Core Configuration
spring.application.name=QuickTix
server.port=${PORT:8080}

# Security: Disable Swagger UI in Production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# PostgreSQL Database (Injected via Environment Variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Tuning
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:50}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:10}

# Strict Schema Management (NO ddl-auto=update)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
app.rabbitmq.exchange=notifyhub_delayed_exchange
app.rabbitmq.routing-key=notifications.routing.key

# Redis (For Rate Limiting and Caching)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.redis.time-to-live=300000

# Security Secrets
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Payment Gateway (e.g., paystack or stripe)
payment.gateway.provider=${PAYMENT_PROVIDER:paystack}
paystack.secret.key=${PAYSTACK_SECRET_KEY}
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

logging.level.root=WARN
logging.level.io.github.kxng0109=INFO