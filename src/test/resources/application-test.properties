# RabbitMQ Configuration (Points to NotifyHub's local broker)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# QuickTix's Producer Configuration for NotifyHub
app.rabbitmq.exchange=notifyhub_delayed_exchange
app.rabbitmq.routing-key=notification.send
